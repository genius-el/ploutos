<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Ploutos | Settings</title>
        <link rel=stylesheet href="../style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <header>
            <div class="logoAndProfile-section">
                <section class="logo-section">
                    <img src="../images/ploutos-logo.png" alt="Ploutos Logo" width="40px" height="40px">
                    <span>Ploutos</span>
                </section>
                
                <section class="header-right">
                    <div class="user-profile">
                        <img src="../images/user-image.jpg" alt="User Avatar" width="20px" height="20px">
                    </div>
                    <div class="profile-dropdown hidden">
                        <p class="user-name">Maverick</p>
                        <button class="logOut-Btn">Logout</button>
                    </div>
                </section>
            </div>
            
            <div class="welcome-section">
                <p class="welcome">Welcome back, Maverick!</p>
            </div>
        </header>

        <main class="settings-main">
            <div class="checkbox-section">
                <input type="checkbox" id="darkModeToggle">
                <label for="darkModeToggle">Dark Mode</label>
            </div>
            <input type="text" placeholder="New Username">
            <select class="currency-select">
                <option value="">Select Currency</option>
                <option value="NG">NG</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
            </select>
            <button>Save Changes</button>
        </main>

        <nav class="nav-bar">
            <ul>
                <li><a href="../index.html"><i class="fa-solid fa-house"></i></a></li>
                <li><a href="../pages/search.html"><i class="fa-solid fa-magnifying-glass"></i></a></li>
                <li><a href="../pages/analytics.html"><i class="fa-solid fa-chart-area"></i></a></li>
                <li><a href="../pages/settings.html"><i class="fa-solid fa-gear"></i></a></li>
            </ul>
        </nav>
    </body>
</html>
