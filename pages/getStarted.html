<!-- SIGN IN PAGE -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Ploutos | Get Started</title>
        <link rel="stylesheet" href="../styles/getStarted.css">
        <script>
            if (localStorage.getItem('appearanceMode') === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        </script>
    </head>
    <body>
        <main class="getStarted-page-main">
            <section class="getStarted-introduction">
                <h2>Welcome to Ploutos</h2>
                <p>Africa's No. 1 Finance and Budget Tracker</p>
                <p>Track your earnings and expenses, manage your budget, and achieve your financial goals with ease.</p>
            </section>
            <section class="form-section">
                <div class="form">
                    <label for="user-name">UserName:</label>
                    <input type="text" id="userName" placeholder="Enter your preferred username">
                    <p id="errorMessage"></p>
                </div>
                <button id="getStartedBtn">Get Started</button>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Ploutos. All rights reserved.</p>
        </footer>

        <script src="../scripts/getStarted.js"></script>
    </body>
</html>
