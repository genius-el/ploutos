<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Ploutos | Home</title>
        <link rel="stylesheet" href="./styles/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <script>
            if (localStorage.getItem('appearanceMode') === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        </script>
    </head>
    <body style="display: none;">
        <header>
            <div class="logoAndProfile-section">
                <section class="logo-section">
                    <img src="./images/ploutos-logo.png" alt="Ploutos Logo" width="40px" height="40px">
                    <span>Ploutos</span>
                </section>
                
                <section class="header-right">
                    <div class="user-profile" id="userProfile">
                        <img src="./images/user-image.png" alt="User Avatar" width="20px" height="20px">
                    </div>
                    <div class="profile-dropdown hidden" id="profileDropdown">
                        <p class="user-name" id="chosenUserName">Maverick</p>
                        <button class="logOut-Btn" id="logOutBtn">Logout</button>
                    </div>
                </section>
            </div>
            
            <div class="welcome-section">
                <p class="welcome" id="welcomeMessage"></p>
            </div>
            
        </header>
        <main>
            <section class="overview-cards">
                 <div class="earnings-card" id="earningsCard">
                    <p>Earnings</p>
                    <h2 id="currentEarningValue">0.00</h2>
                </div>
                <div class="expenses-card" id="expensesCard">
                    <p>Expenses</p>
                    <h2 id="currentExpenseValue">0.00</h2>
                </div>
                <div class="budget-card" id="budgetCard">
                    <p>Budget</p>
                    <h2 id="currentBudgetValue">0.00</h2>
                </div>
            </section>

            <section class="transactions-section">
                <div class="transactions-header">
                    <h2>Recent Transactions</h2>        
                    <p>Filter <i class="fa-solid fa-filter"></i></p>
                </div>
                
                <table class="transactions-table">
                    <thead id="tableHead">
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Type</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        
                    </tbody>
                </table>
            </section>

            <section class="action-buttons">
                <button id="addEarningBtn">Add Earning</button>
                <button id="addExpenseBtn">Add Expense</button>
                <button id="setBudgetBtn">Set Budget</button>
            </section>
           
        </main>
        <nav class="nav-bar">
            <ul>
                <li><a href="./index.html"><i class="fa-solid fa-house"></i></a></li>
                <li><a href="./pages/search.html"><i class="fa-solid fa-magnifying-glass"></i></a></li>
                <li><a href="./pages/analytics.html"><i class="fa-solid fa-chart-area"></i></a></li>
                <li><a href="./pages/settings.html"><i class="fa-solid fa-gear"></i></a></li>
            </ul>
        </nav>

        <!-- Overlay -->
         <div class="overlay hidden"></div>

        <!-- Add Earnings Modal -->
         <div class="modal hidden" id="addEarningModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add Earning</h2>
                    <span class="close-btn">&times;</span>
                </div>
                
                <div class="modal-form">
                    <label for="earning-desctiption">Description:</label>
                    <input type="text" id="earning-description">
                    <label for="earning-amount">Amount:</label>
                    <input type="number" id="earning-amount">
                    <label for="earning-date">Date:</label>
                    <input type="date" id="earning-date">
                    <button type="button" id="submitEarningBtn">Submit Earning</button>
                </div>
            </div>
         </div>

         <!-- Add Expenses Modal -->
         <div class="modal hidden" id="addExpenseModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add Expense</h2>
                    <span class="close-btn">&times;</span>
                </div>
                <div class="modal-form">
                    <label for="expense-description">Description:</label>
                    <input type="text" id="expense-description">
                    <label for="expense-amount">Amount:</label>
                    <input type="number" id="expense-amount">
                    <label for="expense-date">Date:</label>
                    <input type="date" id="expense-date">
                    <button type="button" id="submitExpenseBtn">Submit Expense</button>
                </div>
            </div>
         </div>

         <!-- Set Budget Modal -->
          <div class="modal hidden" id="setBudgetModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Set Budget</h2>
                    <span class="close-btn">&times;</span>
                </div>
                <div class="modal-form">
                    <label for="budget-amount">Amount:</label>
                    <input type="number" id="budget-amount">
                    <label for="budget-date">Date:</label>
                    <input type="date" id="budget-date">
                    <button type="button" id="submitBudgetBtn">Submit Budget</button>
                </div>
            </div>
         </div>

        <script src="./scripts/app.js"></script>
    </body>
</html>
