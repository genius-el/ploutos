<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Ploutos | Home</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <header>
            <div class="logoAndProfile-section">
                <section class="logo-section">
                    <img src="./images/ploutos-logo.png" alt="Ploutos Logo" width="40px" height="40px">
                    <span>Ploutos</span>
                </section>
                
                <section class="header-right">
                    <div class="user-profile">
                        <img src="./images/user-image.jpg" alt="User Avatar" width="20px" height="20px">
                        <p>Maverick</p>
                    </div>
                    <button class="logOut-Btn">Logout</button>
                </section>
            </div>
            
            <div class="welcome-section">
                <p class="welcome">Welcome back, Maverick!</p>
            </div>
            
        </header>
        <main>
            <section class="overview-cards">
                 <div class="earnings-card">
                    <p>Earnings</p>
                    <h2>$1,554.56</h2>
                </div>
                <div class="expenses-card">
                    <p>Expenses</p>
                    <h2>$1,200.00</h2>
                </div>
                <div class="budget-card">
                    <p>Budget</p>
                    <h2>$1,300.56</h2>
                </div>
            </section>

            <section class="transactions-section">
                <div class="transactions-header">
                    <h2>Recent Transactions</h2>        
                    <p>Filter <i class="fa-solid fa-filter"></i></p>
                </div>
                
                <table class="transactions-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Type</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>2026-04-20</td>
                            <td>Salary</td>
                            <td>$1,500.00</td>
                            <td>Earning</td>
                        </tr>
                        <tr>
                            <td>2026-04-21</td>
                            <td>Groceries</td>
                            <td>$150.00</td>
                            <td>Expense</td>
                        </tr>
                        <tr>
                            <td>2026-04-22</td>
                            <td>Electricity Bill</td>
                            <td>$50.00</td>
                            <td>Expense</td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <section class="action-buttons">
                <button>Add Earning</button>
                <button>Add Expense</button>
                <button>Set Budget</button>
            </section>
           
        </main>
        <nav class="nav-bar">
            <ul>
                <li><a href="#"><i class="fa-solid fa-house"></i></a></li>
                <li><a href="#"><i class="fa-solid fa-magnifying-glass"></i></a></li>
                <li><a href="#"><i class="fa-solid fa-chart-area"></i></a></li>
                <li><a href="#"><i class="fa-solid fa-gear"></i></a></li>
            </ul>
        </nav>
    </body>
</html>
